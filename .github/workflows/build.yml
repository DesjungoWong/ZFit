name: Build Z.Fit APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -200

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ZFit-v1.0-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZFit-APK
          path: app/build/outputs/apk/debug/ZFit-v1.0-debug.apk
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-build-${{ github.run_number }}
          name: "Z.Fit v1.0 (Build ${{ github.run_number }})"
          body: |
            ## Z.Fit v1.0

            ### Install on Android
            1. Download `ZFit-v1.0-debug.apk` below
            2. On your phone: Settings → Apps → Install unknown apps → allow your browser
            3. Open the downloaded APK and install
            4. Launch Z.Fit → go to Settings → enter your Claude API key

            ### Minimum: Android 8.0 (Honor 7 Pro supported)

            ### What's inside
            - Calorie ring dashboard + macro tracking
            - Snap & Log with Claude AI food recognition
            - Singapore + global food database (OpenFoodFacts)
            - Google Health Connect import
            - Weekly reports + health score
          files: app/build/outputs/apk/debug/ZFit-v1.0-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
