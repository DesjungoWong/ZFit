name: Build Z.Fit APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate and rename APK
        run: |
          find app/build/outputs/apk -name "*.apk" | head -5
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" app/build/outputs/apk/debug/DEFit-v1.0-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DEFit-APK
          path: app/build/outputs/apk/debug/DEFit-v1.0-debug.apk
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-build-${{ github.run_number }}
          name: "DE.Fit v1.0 (Build ${{ github.run_number }})"
          body: |
            ## DE.Fit v1.0

            ### Install on Android
            1. Download `DEFit-v1.0-debug.apk` below
            2. On your phone: Settings → Apps → Install unknown apps → allow your browser
            3. Open the downloaded APK and install
            4. Launch DE.Fit → go to Settings → enter your Claude API key

            ### Minimum: Android 8.0 (Honor 7 Pro supported)

            ### What's inside
            - Calorie ring dashboard + macro tracking
            - Snap & Log with Claude AI food recognition
            - Singapore + global food database (OpenFoodFacts)
            - Google Health Connect import
            - Weekly reports + health score
          files: app/build/outputs/apk/debug/DEFit-v1.0-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
